<header class="bg-primary text-primary-foreground fixed top-0 z-50 w-full">
  
  <!-- Barra principal -->
  <div class="flex items-center justify-between w-full px-6 py-3">

    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-2 text-2xl font-bold hover:opacity-80 transition">
      <img src="/assets/images/logo-stockmaster.png" alt="Logo-Stockmaster" class="h-[50px]" />
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-8 text-lg">
      <a href="index.html" class="nav-link hover:text-accent transition-colors">Inicio</a>
      <a href="fondos.html" class="nav-link hover:text-accent transition-colors">Fondos</a>
      <a href="sobre-nosotros.html" class="nav-link hover:text-accent transition-colors">Sobre Nosotros</a>
      <a href="tarifas.html" class="nav-link hover:text-accent transition-colors">Tarifas</a>
      <a href="contacto.html" class="nav-link hover:text-accent transition-colors">Contacto</a>
    </nav>

    <!-- Mobile button -->
    <button class="md:hidden text-2xl w-8 text-center" onclick="toggleMenu()" id="menuBtn" aria-label="Toggle menu">
      ☰
    </button>

  </div>

  <!-- Mobile nav — debajo de toda la barra -->
  <nav id="mobileMenu" class="md:hidden hidden flex-col w-full border-t border-white/20">
    <a href="index.html" class="nav-link hover:text-accent hover:bg-white/10 transition-colors px-6 py-3">Inicio</a>
    <a href="fondos.html" class="nav-link hover:text-accent hover:bg-white/10 transition-colors px-6 py-3">Fondos</a>
    <a href="sobre-nosotros.html" class="nav-link hover:text-accent hover:bg-white/10 transition-colors px-6 py-3">Sobre Nosotros</a>
    <a href="tarifas.html" class="nav-link hover:text-accent hover:bg-white/10 transition-colors px-6 py-3">Tarifas</a>
    <a href="contacto.html" class="nav-link hover:text-accent hover:bg-white/10 transition-colors px-6 py-3">Contacto</a>
  </nav>

</header>

<script>
  // Activar link actual con borde inferior (igual que React)
  const currentPage = window.location.pathname.split("/").pop() || "index.html";
  document.querySelectorAll(".nav-link").forEach(link => {
    const linkPage = link.getAttribute("href").split("/").pop();
    if (linkPage === currentPage) {
      link.classList.add("text-accent", "border-b-2", "border-accent", "pb-1");
    }
  });

  // Menú móvil con toggle ☰ / ✕
  function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    const btn = document.getElementById("menuBtn");
    const isOpen = !menu.classList.contains("hidden");

    menu.classList.toggle("hidden");
    menu.classList.toggle("flex");
    btn.textContent = isOpen ? "☰" : "✕";
  }
</script>
